name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      repo_url:
        description: Optional GitHub repository slug or clone URL to audit
        required: false
        type: string

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit dependencies
        run: python -m pip install --upgrade pip PyYAML

      - name: Determine audit source
        id: source
        shell: bash
        env:
          REPO_URL: ${{ inputs.repo_url }}
        run: |
          SOURCE="."
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "$REPO_URL" ]; then
            SOURCE="$REPO_URL"
          fi
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"

      - name: Run audit pipeline
        run: python tools/audit_pipeline.py "${{ steps.source.outputs.source }}" --output audit-report.md

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.md
          if-no-files-found: error
