name: Audit On Demand

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: GitHub repository slug or clone URL to audit
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit pipeline
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit dependencies
        run: python -m pip install --upgrade pip PyYAML

      - name: Checkout target repository
        shell: bash
        env:
          REPO_URL: ${{ inputs.repo_url }}
        run: |
          TARGET_URL="$REPO_URL"
          if [[ "$TARGET_URL" != git@github.com:* && "$TARGET_URL" != http://* && "$TARGET_URL" != https://* ]]; then
            TARGET_URL="https://github.com/${TARGET_URL}.git"
          fi
          git clone --depth 1 "$TARGET_URL" target-repo

      - name: Run audit pipeline
        run: python tools/audit_pipeline.py target-repo --output audit-report.md

      - name: Upload audit report
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.md
          if-no-files-found: error

      - name: Comment on triggering issue
        if: ${{ github.event.issue.number }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number;
            if (!issueNumber) {
              core.info('No issue context was present; skipping comment.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                'The on-demand audit has completed.',
                '',
                'Audit report artifact: `audit-report`'
              ].join('\n')
            });
